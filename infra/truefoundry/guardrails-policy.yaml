# Policy de guardrails del AI Gateway (tenant: healthy). Referencia las
# integraciones de guardrail-group.yaml por selector "grupo/nombre".
# Aplicado el 2026-06-12 vía PUT https://healthy.truefoundry.cloud/api/svc/v1/apply
# Body: {"manifest": <este yaml como JSON>, "dryRun": false}
# UI: AI Gateway -> Controls -> Guardrails
name: farmawatch-double-check
type: gateway-guardrails-config
rules:
  - id: farmawatch-llm-double-check
    # Acotada al único modelo del gateway; si se agregan modelos, ampliar values.
    when:
      target:
        operator: or
        conditions:
          model:
            values:
              - anthropic/claude-sonnet-4-6
            condition: in
    llm_input_guardrails:
      - farmawatch-guardrails/secret-leak-check
      - farmawatch-guardrails/injection-check
    llm_output_guardrails:
      - farmawatch-guardrails/secret-leak-check
    mcp_tool_pre_invoke_guardrails: []
    mcp_tool_post_invoke_guardrails: []
